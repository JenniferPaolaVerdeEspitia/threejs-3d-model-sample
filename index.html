<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Modelo Interactivo 3D</title>

<!-- Fuentes futuristas -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
html, body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#02030a;
  font-family:"Inter",system-ui;
}

/* ===== Fondo galaxia ===== */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(80,120,255,.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,80,180,.18), transparent 45%),
    radial-gradient(circle at 60% 10%, rgba(120,255,255,.15), transparent 40%),
    radial-gradient(1px 1px at 10% 20%, #fff 99%, transparent),
    radial-gradient(1px 1px at 40% 80%, #fff 99%, transparent),
    radial-gradient(1px 1px at 70% 50%, #fff 99%, transparent),
    radial-gradient(1px 1px at 90% 30%, #fff 99%, transparent),
    radial-gradient(1px 1px at 30% 60%, #fff 99%, transparent),
    linear-gradient(180deg,#02030a,#06071a);
  z-index:0;
  pointer-events:none;
}

/* ===== Canvas Three.js ===== */
canvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:1;
}

/* ===== UI ===== */
#ui{
  position:fixed;
  left:16px;
  top:16px;
  z-index:10;
  width:320px;
  padding:14px;
  color:#eaf2ff;
  background:linear-gradient(180deg,rgba(12,18,40,.8),rgba(0,0,0,.45));
  border:1px solid rgba(120,190,255,.25);
  border-radius:16px;
  box-shadow:
    0 0 28px rgba(60,170,255,.18),
    inset 0 0 0 1px rgba(255,255,255,.05);
  backdrop-filter:blur(10px);
}

/* ===== Título futurista ===== */
#title{
  font-family:"Orbitron",system-ui;
  font-size:18px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:#7fe3ff;
  text-shadow:0 0 10px rgba(120,200,255,.4);
  margin-bottom:6px;
}

/* Badge */
.badge{
  font-size:11px;
  padding:3px 8px;
  border-radius:999px;
  background:linear-gradient(90deg,#5cf2ff,#7cffc4);
  color:#04111a;
  font-weight:600;
  margin-left:8px;
}

#status{
  opacity:.9;
}

/* Botones */
#buttons{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-top:10px;
}

button{
  cursor:pointer;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);
  color:#fff;
  border-radius:10px;
  padding:8px 10px;
  text-align:left;
  transition:.15s;
}

button:hover{
  background:rgba(255,255,255,.15);
  transform:scale(1.03);
}

.hint{
  margin-top:10px;
  font-size:12px;
  opacity:.75;
}
</style>
</head>

<body>

<div id="ui">
  <div id="title">
    Modelo 3D Interactivo
    <span class="badge">Three.js</span>
  </div>

  <div id="status">Cargando…</div>
  <div id="buttons"></div>

  <div class="hint">Mouse: orbitar / zoom</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
  }
}
</script>

<script type="module" src="./js/main.js"></script>

</body>
</html>
