<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Modelo Interactivo 3D</title>

  <!-- Tipografías (Star Wars + texto UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pathway+Gothic+One&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    html, body { margin:0; height:100%; overflow:hidden; background:#05060f; }

    /* ===== Fondo Star Wars (estrellas + nebulosa + viñeta) ===== */
    body{
      position: relative;
      color:#eaf2ff;
      font-family: "Inter", system-ui, Arial;
    }

    /* Fondo (capa 0) */
    body::before{
      content:"";
      position:fixed; inset:0;
      background:
        radial-gradient(1px 1px at 12% 22%, rgba(255,255,255,.9) 99%, transparent 100%),
        radial-gradient(1px 1px at 72% 18%, rgba(255,255,255,.8) 99%, transparent 100%),
        radial-gradient(1px 1px at 35% 65%, rgba(255,255,255,.7) 99%, transparent 100%),
        radial-gradient(1px 1px at 88% 75%, rgba(255,255,255,.75) 99%, transparent 100%),
        radial-gradient(1px 1px at 55% 42%, rgba(255,255,255,.65) 99%, transparent 100%),
        radial-gradient(1px 1px at 18% 80%, rgba(255,255,255,.7) 99%, transparent 100%),
        radial-gradient(1px 1px at 92% 40%, rgba(255,255,255,.6) 99%, transparent 100%),
        linear-gradient(180deg, #05060f 0%, #060716 55%, #04040c 100%);
      pointer-events:none;
      z-index:0;
    }

    /* Nebulosa + viñeta (capa 0) */
    body::after{
      content:"";
      position:fixed; inset:0;
      background:
        radial-gradient(900px 550px at 25% 20%, rgba(60,140,255,.18), transparent 60%),
        radial-gradient(800px 520px at 80% 75%, rgba(255,90,160,.10), transparent 55%),
        radial-gradient(circle at 50% 45%, transparent 55%, rgba(0,0,0,.65) 100%);
      pointer-events:none;
      z-index:0;
    }

    /* ===== Canvas Three.js (capa 1) ===== */
    canvas{
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;      /* arriba del fondo (0) */
      display: block;
    }

    /* ===== UI (capa 10) ===== */
    #ui{
      position:fixed; left:14px; top:14px; z-index:10;
      width: 320px;
      padding: 14px 14px 12px;
      color:#eaf2ff;
      font: 14px/1.35 "Inter", system-ui, Arial;
      background: linear-gradient(180deg, rgba(12,22,48,.70), rgba(0,0,0,.35));
      border: 1px solid rgba(255,215,0,.20);
      border-radius: 16px;
      box-shadow:
        0 0 28px rgba(255,215,0,.10),
        0 0 18px rgba(60,170,255,.14),
        inset 0 0 0 1px rgba(255,255,255,.06);
      backdrop-filter: blur(10px);
      user-select:none;
    }

    #title{
      font-family: "Pathway Gothic One", system-ui;
      font-weight: 700;
      letter-spacing: 1.2px;
      font-size: 20px;
      text-transform: uppercase;
      color:#ffd54a;
      text-shadow: 0 0 18px rgba(255,213,74,.25);
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom: 6px;
    }

    #title .badge{
      font-family: "Inter", system-ui;
      font-weight: 600;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      color:#08101f;
      background: linear-gradient(90deg, rgba(255,213,74,1), rgba(120,255,209,1));
      box-shadow: 0 0 18px rgba(255,213,74,.18);
    }

    #status{ opacity:.92; }

    #buttons{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
      margin-top:10px;
    }

    button{
      cursor:pointer;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      color:#fff;
      border-radius:12px;
      padding:9px 10px;
      text-align:left;
      transition: transform .08s ease, background .15s ease;
    }
    button:hover{ background:rgba(255,255,255,.12); }
    button:active{ transform: scale(.98); }

    .hint{
      margin-top:10px;
      opacity:.85;
      font-family: "Pathway Gothic One", system-ui;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: rgba(255,213,74,.85);
    }
  </style>
</head>

<body>
  <div id="ui">
    <div id="title">
      Modelo Interactivo 3D
      <span class="badge">Three.js</span>
    </div>

    <div id="status">Cargando…</div>
    <div id="buttons"></div>
    <div class="hint">Mouse: orbitar / zoom</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
      }
    }
  </script>

  <!-- Importante: debe ser module para usar importmap -->
  <script type="module" src="./js/main.js"></script>
</body>
</html>
